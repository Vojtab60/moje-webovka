<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Co se děje dnes</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.addBtn{
background:black;
color:white;
margin-bottom:20px;
}

.joinBtn{
background:black;
color:white;
margin-left:10px;
}

.deleteBtn{
background:#ef4444;
color:white;
margin-left:10px;
}

.card{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

.form{
margin-top:20px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Co se děje dnes</h1>
<p>Najdi lidi na aktivity ve městě.</p>

<button class="addBtn" onclick="showForm()">Přidat aktivitu</button>

<div class="form" id="form">

<input id="name" placeholder="Název aktivity">

<input id="place" placeholder="Místo">

<input id="time" type="time">

<input id="limit" type="number" placeholder="Max lidí">

<button onclick="addActivity()">Uložit</button>

</div>

<div id="activities"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAdgadZzLOidx-BumttNy4GeI7u8ggjIFI",
authDomain: "co-se-dnes-deje.firebaseapp.com",
projectId: "co-se-dnes-deje",
storageBucket: "co-se-dnes-deje.appspot.com",
messagingSenderId: "184158833468",
appId: "1:184158833468:web:224e91a5a82f2b6bc4ec39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const activitiesDiv = document.getElementById("activities");

window.showForm = () => {
document.getElementById("form").style.display="block";
}

window.addActivity = async () => {

const name=document.getElementById("name").value;
const place=document.getElementById("place").value;
const time=document.getElementById("time").value;
const limit=parseInt(document.getElementById("limit").value);

await addDoc(collection(db,"activities"),{
name,
place,
time,
limit,
people:0
});

}

onSnapshot(collection(db,"activities"),snapshot=>{

activitiesDiv.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const id=docSnap.id;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<b>${data.name}</b><br>
${data.place} • ${data.time}<br>
👥 ${data.people}/${data.limit} lidí
</div>

<div>
<button class="joinBtn">Připojit se</button>
<button class="deleteBtn">Smazat</button>
</div>
`;

div.querySelector(".joinBtn").onclick=async()=>{

if(data.people<data.limit){

await updateDoc(doc(db,"activities",id),{
people:data.people+1
})

}

}

div.querySelector(".deleteBtn").onclick=async()=>{

await deleteDoc(doc(db,"activities",id));

}

activitiesDiv.appendChild(div);

})

});

</script>

</body>
</html>
