<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Co se děje dnes</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  padding: 40px;
  margin: 0;
}

.container{
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1{
  font-size: 36px;
  margin-bottom: 10px;
}

p{
  color: #555;
  margin-bottom: 20px;
}

button{
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.addBtn{
  background: black;
  color: white;
  margin-bottom: 20px;
}

.joinBtn{
  background: black;
  color: white;
  margin-left: 10px;
}

.deleteBtn{
  background: #ef4444;
  color: white;
  margin-left: 10px;
}

input{
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

.form{
  margin-top: 20px;
  display: none;
}

.card{
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.card-left{
  flex: 1;
}

.meta{
  color: #666;
  margin-top: 4px;
}

.meta a{
  color: #2563eb;
  text-decoration: none;
}

.meta a:hover{
  text-decoration: underline;
}

.people{
  margin-top: 6px;
  font-size: 14px;
}

.author{
  font-size: 13px;
  color: #888;
  margin-top: 4px;
}

.empty{
  text-align: center;
  padding: 20px;
  border: 1px dashed #ccc;
  border-radius: 12px;
  margin-top: 20px;
  color: #777;
}

.hint-box{
  margin-top: 20px;
  padding: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  background: #fafafa;
  color: #555;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Co se děje dnes</h1>
  <p>Najdi lidi na aktivity ve městě.</p>

  <input id="username" placeholder="Tvoje jméno a příjmení">

  <button class="addBtn" onclick="showForm()">Přidat aktivitu</button>

  <div class="form" id="form">
    <input id="name" placeholder="Název aktivity">
    <input id="place" placeholder="Místo">
    <input id="time" type="time">
    <input id="limit" type="number" placeholder="Max lidí">
    <button onclick="addActivity()">Uložit</button>
  </div>

  <div class="hint-box">
    📍 Klikni na místo u aktivity a na mapě uvidíš tu lokaci.
  </div>

  <div id="activities"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdgadZzLOidx-BumttNy4GeI7u8ggjIFI",
  authDomain: "co-se-dnes-deje.firebaseapp.com",
  projectId: "co-se-dnes-deje",
  storageBucket: "co-se-dnes-deje.appspot.com",
  messagingSenderId: "184158833468",
  appId: "1:184158833468:web:224e91a5a82f2b6bc4ec39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const activitiesDiv = document.getElementById("activities");
const usernameInput = document.getElementById("username");

const savedName = localStorage.getItem("username");
if (savedName) {
  usernameInput.value = savedName;
}

usernameInput.addEventListener("input", () => {
  localStorage.setItem("username", usernameInput.value);
});

window.showForm = () => {
  document.getElementById("form").style.display = "block";
};

window.addActivity = async () => {
  const user = document.getElementById("username").value.trim();
  const name = document.getElementById("name").value.trim();
  const place = document.getElementById("place").value.trim();
  const time = document.getElementById("time").value;
  const limit = parseInt(document.getElementById("limit").value);

  if (!user || !name || !place || !time || !limit) {
    alert("Vyplň všechna pole.");
    return;
  }

  localStorage.setItem("username", user);

  await addDoc(collection(db, "activities"), {
    name,
    place,
    time,
    limit,
    people: 0,
    author: user
  });

  document.getElementById("name").value = "";
  document.getElementById("place").value = "";
  document.getElementById("time").value = "";
  document.getElementById("limit").value = "";
  document.getElementById("form").style.display = "none";
};

onSnapshot(collection(db, "activities"), (snapshot) => {
  activitiesDiv.innerHTML = "";

  if (snapshot.empty) {
    activitiesDiv.innerHTML = `<div class="empty">Zatím tu není žádná aktivita.</div>`;
    return;
  }

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const div = document.createElement("div");
    div.className = "card";

    const placeUrl = `https://www.google.com/maps/search/${encodeURIComponent(data.place)}`;

    div.innerHTML = `
      <div class="card-left">
        <b>${data.name}</b>
        <div class="meta">
          <a href="${placeUrl}" target="_blank">${data.place}</a> • ${data.time}
        </div>
        <div class="people">👥 ${data.people}/${data.limit} lidí</div>
        <div class="author">vytvořil: ${data.author}</div>
      </div>

      <div>
        <button class="joinBtn">Připojit se</button>
        <button class="deleteBtn">Smazat</button>
      </div>
    `;

    div.querySelector(".joinBtn").onclick = async () => {
      if (data.people < data.limit) {
        await updateDoc(doc(db, "activities", id), {
          people: data.people + 1
        });
      } else {
        alert("Aktivita je plná.");
      }
    };

    div.querySelector(".deleteBtn").onclick = async () => {
      await deleteDoc(doc(db, "activities", id));
    };

    activitiesDiv.appendChild(div);
  });
});
</script>

</body>
</html>
